<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DaddyRecorder Editor</title>
  <link rel="stylesheet" href="editor.css">
</head>
<body>
  <div class="editor-container">
    <!-- Main Content Area -->
    <main class="editor-main">
      <!-- Video Preview -->
      <div class="preview-container">
        <div class="preview-wrapper" id="previewWrapper">
          <div class="preview-background" id="previewBackground"></div>
          <div class="preview-frame" id="previewFrame">
            <!-- Minimal Browser Frame (Cursorful style) -->
            <div class="minimal-frame hidden" id="minimalFrame">
              <div class="frame-left">
                <div class="browser-dots">
                  <span class="dot red"></span>
                  <span class="dot yellow"></span>
                  <span class="dot green"></span>
                </div>
                <div class="frame-nav">
                  <button class="frame-nav-btn">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                      <path d="M15 18l-6-6 6-6"/>
                    </svg>
                  </button>
                  <button class="frame-nav-btn">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                      <path d="M9 18l6-6-6-6"/>
                    </svg>
                  </button>
                </div>
              </div>
              <div class="frame-center">
                <div class="frame-url-bar">
                  <svg class="frame-lock" width="8" height="8" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19 11H5a2 2 0 00-2 2v7a2 2 0 002 2h14a2 2 0 002-2v-7a2 2 0 00-2-2zm-7-7a4 4 0 00-4 4v3h8V8a4 4 0 00-4-4z"/>
                  </svg>
                  <span class="frame-url">daddyrecorder.com</span>
                  <svg class="frame-refresh" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M23 4v6h-6"/>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                  </svg>
                </div>
              </div>
              <div class="frame-right">
                <svg class="frame-brand" viewBox="0 0 100 100" fill="none">
                  <defs>
                    <linearGradient id="frameBrandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                      <stop offset="0%" stop-color="#17FEA0"/>
                      <stop offset="100%" stop-color="#01FD48"/>
                    </linearGradient>
                  </defs>
                  <path d="M 30 18 L 82 50 L 30 70 Z" fill="url(#frameBrandGrad)"/>
                </svg>
              </div>
            </div>
            <div class="video-container" id="videoContainer">
              <video id="videoPlayer" class="video-player"></video>
            </div>
          </div>
        </div>
      </div>

      <!-- Playback Controls -->
      <div class="playback-controls">
        <button class="play-btn" id="playBtn">
          <svg class="play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          <svg class="pause-icon hidden" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="4" width="4" height="16"/>
            <rect x="14" y="4" width="4" height="16"/>
          </svg>
        </button>
        <div class="time-display">
          <span id="currentTime">00:00</span>
          <span class="time-separator">/</span>
          <span id="duration">00:00</span>
        </div>
        <div class="progress-container">
          <div class="progress-bar" id="progressBar">
            <div class="progress-filled" id="progressFilled"></div>
            <div class="progress-handle" id="progressHandle"></div>
          </div>
        </div>
      </div>

      <!-- Timeline -->
      <div class="timeline-container">
        <div class="timeline-tools">
          <!-- Add Zoom -->
          <button class="timeline-btn zoom-btn" id="addZoomBtn" title="Add zoom segment">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
              <line x1="11" y1="8" x2="11" y2="14"/>
              <line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
            <span>Add Zoom</span>
          </button>
          <div class="toolbar-divider"></div>
          <!-- Split at playhead -->
          <button class="timeline-btn" id="splitBtn" title="Split at playhead (S)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="2" x2="12" y2="22"/>
              <rect x="4" y="6" width="4" height="12" rx="1"/>
              <rect x="16" y="6" width="4" height="12" rx="1"/>
            </svg>
            <span>Split</span>
          </button>
          <!-- Delete selected -->
          <button class="timeline-btn" id="deleteClipBtn" title="Delete selected (Del)" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
            <span>Delete</span>
          </button>
          <!-- Trim to start -->
          <button class="timeline-btn icon-only" id="trimStartBtn" title="Trim to start">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 17l-5-5 5-5"/>
              <path d="M18 17l-5-5 5-5"/>
            </svg>
            <span>Trim start</span>
          </button>
          <!-- Trim to end -->
          <button class="timeline-btn icon-only" id="trimEndBtn" title="Trim to end">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M6 17l5-5-5-5"/>
              <path d="M13 17l5-5-5-5"/>
            </svg>
            <span>Trim end</span>
          </button>
          <div class="timeline-spacer"></div>
          <!-- Speed control for selected clip -->
          <div class="speed-control" id="speedControl">
            <label>Speed</label>
            <select id="clipSpeed">
              <option value="0.25">0.25x</option>
              <option value="0.5">0.5x</option>
              <option value="0.75">0.75x</option>
              <option value="1" selected>1x</option>
              <option value="1.25">1.25x</option>
              <option value="1.5">1.5x</option>
              <option value="2">2x</option>
              <option value="4">4x</option>
              <option value="8">8x</option>
              <option value="custom">Custom...</option>
            </select>
            <div class="custom-speed-wrapper hidden" id="customSpeedWrapper">
              <input type="number" id="customSpeed" class="custom-speed-input" min="0.1" max="100" step="0.1">
              <span class="speed-suffix">x</span>
            </div>
          </div>
          <!-- Reset -->
          <button class="timeline-btn" id="resetTimelineBtn" title="Reset all edits">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
              <path d="M3 3v5h5"/>
            </svg>
            <span>Reset timeline</span>
          </button>
        </div>
        <div class="timeline-track" id="timelineTrack">
          <div class="timeline-ruler" id="timelineRuler">
            <!-- Time markers generated by JS -->
          </div>
          <!-- Video clips track -->
          <div class="timeline-track-row">
            <div class="track-label">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="23 7 16 12 23 17 23 7"/>
                <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
              </svg>
            </div>
            <div class="timeline-clips-wrapper">
              <div class="timeline-clips" id="timelineClips">
                <!-- Clips will be rendered dynamically -->
              </div>
            </div>
          </div>
          <!-- Zoom segments track -->
          <div class="timeline-track-row zoom-track">
            <div class="track-label">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
            </div>
            <div class="timeline-zoom-wrapper">
              <div class="timeline-zooms" id="timelineZooms">
                <!-- Zoom segments will be rendered dynamically -->
              </div>
            </div>
          </div>
          <!-- Playhead spans all tracks -->
          <div class="timeline-playhead" id="timelinePlayhead"></div>
        </div>
      </div>
    </main>

    <!-- Sidebar Icon Strip -->
    <div class="sidebar-tabs">
      <button class="sidebar-tab active" data-tab="settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
      <button class="sidebar-tab" data-tab="export">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </button>
      <button class="sidebar-tab" data-tab="zoom">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="11" y1="8" x2="11" y2="14"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </button>
      <button class="sidebar-tab" data-tab="crop">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6.13 1L6 16a2 2 0 0 0 2 2h15"/>
          <path d="M1 6.13L16 6a2 2 0 0 1 2 2v15"/>
        </svg>
      </button>
      <button class="sidebar-tab" data-tab="captions">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M7 12h2M15 12h2M7 16h10"/>
        </svg>
      </button>
    </div>

    <!-- Right Sidebar -->
    <aside class="editor-sidebar">
      <!-- Sidebar Content -->
      <div class="sidebar-content">
        <!-- Export Button -->
        <button class="export-btn" id="exportBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <span>Export video</span>
        </button>

        <!-- Zoom Panel -->
        <div class="zoom-panel" id="zoomPanel">
          <div class="zoom-empty-state" id="zoomEmptyState">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
              <line x1="11" y1="8" x2="11" y2="14"/>
              <line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
            <p>No zoom selected.<br>Click "Add Zoom" or select a zoom segment on the timeline.</p>
          </div>
          <div class="zoom-controls hidden" id="zoomControls">
            <div class="zoom-control-group">
              <span class="zoom-control-label">Position</span>
              <div class="position-toggle">
                <button class="position-btn active" data-position="follow" id="positionFollow">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
                    <path d="M13 13l6 6"/>
                  </svg>
                  Follow Cursor
                </button>
                <button class="position-btn" data-position="fixed" id="positionFixed">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                  Fixed
                </button>
              </div>
              <div class="fixed-position-picker" id="fixedPositionPicker">
                <span class="zoom-control-label" style="margin-top: 12px;">Focus Point</span>
                <div class="position-grid">
                  <button class="position-cell" data-x="0" data-y="0"></button>
                  <button class="position-cell" data-x="0.5" data-y="0"></button>
                  <button class="position-cell" data-x="1" data-y="0"></button>
                  <button class="position-cell" data-x="0" data-y="0.5"></button>
                  <button class="position-cell active" data-x="0.5" data-y="0.5"></button>
                  <button class="position-cell" data-x="1" data-y="0.5"></button>
                  <button class="position-cell" data-x="0" data-y="1"></button>
                  <button class="position-cell" data-x="0.5" data-y="1"></button>
                  <button class="position-cell" data-x="1" data-y="1"></button>
                </div>
              </div>
            </div>
            <div class="zoom-control-group">
              <span class="zoom-control-label">Depth (Zoom Level)</span>
              <div class="depth-slider-wrapper">
                <input type="range" class="depth-slider" id="zoomDepth" min="1.2" max="3" step="0.1" value="1.5">
                <div class="depth-labels">
                  <span>1.2x</span>
                  <span>3x</span>
                </div>
                <div class="depth-value" id="depthValue">1.5x</div>
              </div>
            </div>
            <button class="delete-zoom-btn" id="deleteZoomBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
              </svg>
              Delete Zoom
            </button>
          </div>
        </div>

        <!-- Settings Panel -->
        <div class="settings-panel" id="settingsPanel">
          <!-- Aspect Ratio -->
          <div class="setting-group">
            <label class="setting-label">Aspect ratio</label>
            <select class="setting-select" id="aspectRatio">
              <option value="native">Native</option>
              <option value="21:9">21:9</option>
              <option value="16:9">16:9</option>
              <option value="16:10">16:10</option>
              <option value="3:2">3:2</option>
              <option value="4:3">4:3</option>
              <option value="1:1">1:1</option>
              <option value="3:4">3:4</option>
              <option value="2:3">2:3</option>
              <option value="10:16">10:16</option>
              <option value="9:16">9:16</option>
            </select>
          </div>

          <!-- Background -->
          <div class="setting-group">
            <label class="setting-label">Background</label>
            <div class="bg-type-tabs">
              <button class="bg-tab active" data-type="image">Image</button>
              <button class="bg-tab" data-type="gradient">Gradient</button>
              <button class="bg-tab" data-type="color">Color</button>
              <button class="bg-tab" data-type="hidden">Hidden</button>
            </div>

            <!-- Image Background Presets -->
            <div class="bg-presets bg-images" id="bgImages">
              <button class="bg-preset bg-image active" data-bg-image="../assets/abstract.webp" style="background-image: url('../assets/abstract.webp')"></button>
              <button class="bg-preset bg-image" data-bg-image="../assets/mountains.webp" style="background-image: url('../assets/mountains.webp')"></button>
              <button class="bg-preset bg-image" data-bg-image="../assets/sky.webp" style="background-image: url('../assets/sky.webp')"></button>
              <button class="bg-preset bg-image" data-bg-image="../assets/inky.webp" style="background-image: url('../assets/inky.webp')"></button>
              <button class="bg-preset bg-image" data-bg-image="../assets/water-ripple.webp" style="background-image: url('../assets/water-ripple.webp')"></button>
            </div>

            <!-- Gradient Background Presets -->
            <div class="bg-presets bg-gradients hidden" id="bgGradients">
              <button class="bg-preset" data-bg="linear-gradient(135deg, #667eea 0%, #764ba2 100%)"></button>
              <button class="bg-preset" data-bg="linear-gradient(135deg, #f093fb 0%, #f5576c 100%)"></button>
              <button class="bg-preset" data-bg="linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)"></button>
              <button class="bg-preset" data-bg="linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)"></button>
              <button class="bg-preset" data-bg="linear-gradient(135deg, #fa709a 0%, #fee140 100%)"></button>
              <button class="bg-preset" data-bg="linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)"></button>
              <button class="bg-preset" data-bg="linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)"></button>
              <button class="bg-preset" data-bg="linear-gradient(135deg, #2c3e50 0%, #4ca1af 100%)"></button>
              <button class="bg-preset" data-bg="linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 100%)"></button>
              <button class="bg-preset" data-bg="linear-gradient(135deg, #ee0979 0%, #ff6a00 100%)"></button>
            </div>

            <!-- Solid Color Presets -->
            <div class="bg-presets bg-colors hidden" id="bgColors">
              <button class="bg-preset" data-bg="#0a0a0b" style="background: #0a0a0b"></button>
              <button class="bg-preset" data-bg="#1a1a2e" style="background: #1a1a2e"></button>
              <button class="bg-preset" data-bg="#1e3a5f" style="background: #1e3a5f"></button>
              <button class="bg-preset" data-bg="#0d4f3c" style="background: #0d4f3c"></button>
              <button class="bg-preset" data-bg="#4a1942" style="background: #4a1942"></button>
              <button class="bg-preset" data-bg="#ffffff" style="background: #ffffff; border: 1px solid #27272a"></button>
              <button class="bg-preset" data-bg="#f4f4f5" style="background: #f4f4f5"></button>
              <button class="bg-preset" data-bg="#e0f2fe" style="background: #e0f2fe"></button>
              <button class="bg-preset" data-bg="#fef3c7" style="background: #fef3c7"></button>
              <button class="bg-preset" data-bg="#fce7f3" style="background: #fce7f3"></button>
            </div>

            <!-- Image Blur (only shown for image backgrounds) -->
            <div class="setting-row" id="imageBlurRow">
              <span class="setting-row-label">Background blur</span>
              <select class="setting-select small" id="imageBlur">
                <option value="none">None</option>
                <option value="light">Light</option>
                <option value="moderate" selected>Moderate</option>
                <option value="heavy">Heavy</option>
              </select>
            </div>
          </div>

          <!-- Crop / System UI -->
          <div class="setting-group">
            <label class="setting-label">Crop</label>
            <div class="setting-toggles">
              <label class="toggle-row">
                <span>Hide menu bar</span>
                <label class="toggle">
                  <input type="checkbox" id="hideMenuBar">
                  <span class="toggle-slider"></span>
                </label>
              </label>
              <label class="toggle-row">
                <span>Hide dock</span>
                <label class="toggle">
                  <input type="checkbox" id="hideDock">
                  <span class="toggle-slider"></span>
                </label>
              </label>
            </div>
          </div>

          <!-- Browser Frame -->
          <div class="setting-group">
            <label class="setting-label">Browser frame</label>
            <div class="frame-tabs">
              <button class="frame-tab active" data-frame="default">Default</button>
              <button class="frame-tab" data-frame="minimal">Minimal</button>
              <button class="frame-tab" data-frame="hidden">Hidden</button>
            </div>

            <div class="setting-toggles">
              <label class="toggle-row">
                <span>Frame shadow</span>
                <label class="toggle">
                  <input type="checkbox" id="frameShadow" checked>
                  <span class="toggle-slider"></span>
                </label>
              </label>
              <label class="toggle-row">
                <span>Frame border</span>
                <label class="toggle">
                  <input type="checkbox" id="frameBorder">
                  <span class="toggle-slider"></span>
                </label>
              </label>
            </div>
          </div>

          <!-- Cursor -->
          <div class="setting-group">
            <label class="setting-label">Cursor</label>

            <div class="setting-row">
              <span class="setting-row-label">Size</span>
              <select class="setting-select small" id="cursorSize">
                <option value="small">Small</option>
                <option value="medium" selected>Medium</option>
                <option value="large">Large</option>
              </select>
            </div>

            <div class="setting-toggles">
              <label class="toggle-row">
                <span>Smooth movement</span>
                <label class="toggle">
                  <input type="checkbox" id="smoothMovement" checked>
                  <span class="toggle-slider"></span>
                </label>
              </label>
              <label class="toggle-row">
                <span>Cursor shadow</span>
                <label class="toggle">
                  <input type="checkbox" id="cursorShadow" checked>
                  <span class="toggle-slider"></span>
                </label>
              </label>
            </div>
          </div>


          <!-- Click Animation -->
          <div class="setting-group">
            <label class="setting-label">Click animation</label>

            <div class="setting-row">
              <span class="setting-row-label">Style</span>
              <select class="setting-select small" id="clickStyle">
                <option value="none">None</option>
                <option value="orb" selected>Orb</option>
                <option value="ripple">Ripple</option>
                <option value="pulse">Pulse</option>
              </select>
            </div>

            <div class="setting-row">
              <span class="setting-row-label">Force</span>
              <select class="setting-select small" id="clickForce">
                <option value="light">Light</option>
                <option value="moderate" selected>Moderate</option>
                <option value="strong">Strong</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <!-- Sidebar Footer -->
      <div class="sidebar-footer">
        <span>Made with ❤️ by</span>
        <a href="https://x.com/muhamdanaskhan" target="_blank">Anas</a>
        <span>&</span>
        <a href="https://x.com/okzaid" target="_blank">Zaid</a>
      </div>
    </aside>
  </div>

  <!-- Export Modal -->
  <div class="modal-overlay hidden" id="exportModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Export video</h2>
        <button class="modal-close" id="closeModal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-content">
        <div class="export-option">
          <label>Resolution</label>
          <select class="setting-select" id="exportResolution">
            <option value="1080p">1080p</option>
            <option value="720p">720p</option>
            <option value="480p">480p</option>
          </select>
        </div>
        <div class="export-option">
          <label>Quality</label>
          <div class="quality-slider">
            <input type="range" id="exportQuality" min="1" max="100" value="80">
            <div class="quality-labels">
              <span>Smaller file size</span>
              <span>Higher quality</span>
            </div>
          </div>
        </div>
        <div class="export-option">
          <label>Format</label>
          <select class="setting-select" id="exportFormat">
            <option value="webm">WebM</option>
            <option value="mp4">MP4</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="export-final-btn" id="exportFinalBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <span>Export video</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay hidden" id="loadingOverlay">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <p class="loading-text">Exporting video...</p>
      <div class="loading-progress">
        <div class="loading-progress-bar" id="loadingProgressBar"></div>
      </div>
    </div>
  </div>

  <script src="editor.js"></script>
</body>
</html>
