<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DaddyRecorder</title>
  <link rel="stylesheet" href="recorder.css">
</head>
<body>
  <div class="ambient-bg">
    <!-- Flowing wave lines - inspired by motion/audio -->
    <svg class="wave-lines" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" fill="none">
      <defs>
        <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#22c55e" stop-opacity="0.5"/>
          <stop offset="50%" stop-color="#10b981" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.2"/>
        </linearGradient>
        <linearGradient id="waveGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#34d399" stop-opacity="0.25"/>
        </linearGradient>
        <linearGradient id="waveGrad3" x1="100%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#4ade80" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#16a34a" stop-opacity="0.2"/>
        </linearGradient>
      </defs>
      <!-- Wave Group 1 - Pink to Orange flow -->
      <g class="wave-group wave-group-1">
        <path d="M-100,600 Q200,400 400,500 T800,450 T1200,550 T1600,400" stroke="url(#waveGrad1)" stroke-width="1.5" fill="none"/>
        <path d="M-100,620 Q220,420 420,520 T820,470 T1220,570 T1600,420" stroke="url(#waveGrad1)" stroke-width="1.2" fill="none"/>
        <path d="M-100,640 Q240,440 440,540 T840,490 T1240,590 T1600,440" stroke="url(#waveGrad1)" stroke-width="1" fill="none"/>
        <path d="M-100,660 Q260,460 460,560 T860,510 T1260,610 T1600,460" stroke="url(#waveGrad1)" stroke-width="0.8" fill="none"/>
        <path d="M-100,680 Q280,480 480,580 T880,530 T1280,630 T1600,480" stroke="url(#waveGrad1)" stroke-width="0.6" fill="none"/>
      </g>
      <!-- Wave Group 2 - Purple to Cyan flow -->
      <g class="wave-group wave-group-2">
        <path d="M-100,700 Q300,500 500,600 T900,550 T1300,650 T1600,500" stroke="url(#waveGrad2)" stroke-width="1.5" fill="none"/>
        <path d="M-100,720 Q320,520 520,620 T920,570 T1320,670 T1600,520" stroke="url(#waveGrad2)" stroke-width="1.2" fill="none"/>
        <path d="M-100,740 Q340,540 540,640 T940,590 T1340,690 T1600,540" stroke="url(#waveGrad2)" stroke-width="1" fill="none"/>
        <path d="M-100,760 Q360,560 560,660 T960,610 T1360,710 T1600,560" stroke="url(#waveGrad2)" stroke-width="0.8" fill="none"/>
      </g>
      <!-- Wave Group 3 - Green accent -->
      <g class="wave-group wave-group-3">
        <path d="M-100,780 Q400,600 600,700 T1000,650 T1400,750 T1600,600" stroke="url(#waveGrad3)" stroke-width="1.2" fill="none"/>
        <path d="M-100,800 Q420,620 620,720 T1020,670 T1420,770 T1600,620" stroke="url(#waveGrad3)" stroke-width="1" fill="none"/>
        <path d="M-100,820 Q440,640 640,740 T1040,690 T1440,790 T1600,640" stroke="url(#waveGrad3)" stroke-width="0.8" fill="none"/>
      </g>
    </svg>

    <!-- Soft glow layer -->
    <div class="glow-layer"></div>

    <!-- Audio visualizer bars - subtle recording feel -->
    <div class="audio-visualizer">
      <div class="viz-bar"></div>
      <div class="viz-bar"></div>
      <div class="viz-bar"></div>
      <div class="viz-bar"></div>
      <div class="viz-bar"></div>
      <div class="viz-bar"></div>
      <div class="viz-bar"></div>
      <div class="viz-bar"></div>
      <div class="viz-bar"></div>
      <div class="viz-bar"></div>
      <div class="viz-bar"></div>
      <div class="viz-bar"></div>
    </div>

  </div>
  <div class="shell">
    <header class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 100 100" fill="none">
            <defs>
              <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#17FEA0"/>
                <stop offset="100%" stop-color="#01FD48"/>
              </linearGradient>
              <linearGradient id="shadowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#0AA868"/>
                <stop offset="100%" stop-color="#027A26"/>
              </linearGradient>
              <linearGradient id="highlightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#B6FFD9"/>
                <stop offset="100%" stop-color="#6CFFA3"/>
              </linearGradient>
            </defs>
            <path d="M 88 50 L 82 56 L 36 82 L 36 74 Z" fill="url(#shadowGrad)"/>
            <path d="M 36 74 L 36 82 L 30 78 L 30 70 Z" fill="url(#shadowGrad)"/>
            <path d="M 30 18 L 82 50 L 30 70 Z" fill="url(#mainGrad)"/>
            <path d="M 30 18 L 36 14 L 88 46 L 82 50 Z" fill="url(#highlightGrad)"/>
            <path d="M 30 18 L 36 14 L 36 74 L 30 70 Z" fill="url(#highlightGrad)"/>
          </svg>
        </div>
        <span class="logo-text">DaddyRecorder</span>
      </div>
      <div class="timer" id="timer">00:00</div>
    </header>

    <main class="main">
      <h1 class="title">Ready to record</h1>
      <p class="subtitle" id="subtitle">Your sources are set up. Click Start when you're ready.</p>

      <div class="sources">
        <!-- Screen -->
        <div class="source-card" id="sourceScreen">
          <div class="source-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="3" width="20" height="14" rx="2"/>
              <line x1="8" y1="21" x2="16" y2="21"/>
              <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
          </div>
          <div class="source-body">
            <div class="source-title">Screen</div>
            <div class="source-status" id="screenStatus">You'll pick tab / window / screen next</div>
          </div>
        </div>

        <!-- Microphone -->
        <div class="source-card" id="sourceMic">
          <div class="source-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </div>
          <div class="source-body">
            <div class="source-title">Microphone</div>
            <div class="source-status" id="micStatus">Off</div>
            <select class="device-select hidden" id="micSelect"></select>
            <div class="mic-meter hidden" id="micMeter"><div class="mic-fill" id="micFill"></div></div>
          </div>
        </div>

        <!-- Camera -->
        <div class="source-card" id="sourceCamera">
          <div class="source-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 7l-7 5 7 5V7z"/>
              <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
            </svg>
          </div>
          <div class="source-body">
            <div class="source-title">Camera</div>
            <div class="source-status" id="cameraStatus">Off</div>
            <select class="device-select hidden" id="cameraSelect"></select>
          </div>
          <video class="camera-preview hidden" id="cameraPreview" muted playsinline autoplay></video>
        </div>
      </div>

      <div class="actions">
        <button class="primary-btn" id="startBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/></svg>
          Start recording
        </button>
        <button class="pause-btn hidden" id="pauseBtn">
          <svg id="pauseIcon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="5" width="4" height="14" rx="1"/>
            <rect x="14" y="5" width="4" height="14" rx="1"/>
          </svg>
          <span id="pauseLabel">Pause</span>
        </button>
        <button class="stop-btn hidden" id="stopBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>
          Stop recording
        </button>
      </div>

      <div class="status-bar" id="statusBar"></div>

      <p class="tip">
        Keep this tab open while recording. Click the DaddyRecorder icon or come back here to stop.
      </p>
    </main>

    <!-- 3-2-1 countdown after the user picks their source, before
         MediaRecorder actually starts. Shown fullscreen in this tab. -->
    <div class="countdown-overlay hidden" id="countdownOverlay">
      <div class="countdown-label">Recording starts in</div>
      <div class="countdown-number" id="countdownNumber">3</div>
    </div>
  </div>
  <script src="recorder.js"></script>
</body>
</html>
