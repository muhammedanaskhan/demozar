<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.48" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="16" height="16" rx="3.2" fill="url(#grad)"/>
  <circle cx="8" cy="8" r="5.6" stroke="white" stroke-width="0.64" fill="none" filter="url(#glow)" opacity="0.9"/>
  <circle cx="8" cy="8" r="2.4" fill="white" filter="url(#glow)"/>
</svg>