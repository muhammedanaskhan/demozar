<!DOCTYPE html>
<html>
<head>
  <title>Icon Converter - Spotlight Recorder</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 { color: #333; }
    .icon-preview {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin: 20px 0;
    }
    .icon-item {
      text-align: center;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .icon-item canvas {
      display: block;
      margin: 0 auto 10px;
    }
    button {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { opacity: 0.9; }
    .download-all {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Spotlight Recorder Icons</h1>
  <p>Click "Download All" to get all PNG icons, or download individually.</p>

  <div class="icon-preview" id="preview"></div>

  <button class="download-all" onclick="downloadAll()">Download All PNGs</button>

  <script>
    const sizes = [16, 32, 48, 128];
    const preview = document.getElementById('preview');

    function generateIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      // Create gradient
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#6366f1');
      gradient.addColorStop(1, '#8b5cf6');

      // Draw rounded rectangle background
      const radius = size * 0.2;
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(size - radius, 0);
      ctx.quadraticCurveTo(size, 0, size, radius);
      ctx.lineTo(size, size - radius);
      ctx.quadraticCurveTo(size, size, size - radius, size);
      ctx.lineTo(radius, size);
      ctx.quadraticCurveTo(0, size, 0, size - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.fill();

      // Draw outer ring
      ctx.beginPath();
      ctx.arc(size / 2, size / 2, size * 0.35, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
      ctx.lineWidth = Math.max(1, size * 0.04);
      ctx.stroke();

      // Draw glow effect for ring
      ctx.beginPath();
      ctx.arc(size / 2, size / 2, size * 0.35, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.lineWidth = Math.max(2, size * 0.08);
      ctx.stroke();

      // Draw inner circle
      ctx.beginPath();
      ctx.arc(size / 2, size / 2, size * 0.15, 0, Math.PI * 2);
      ctx.fillStyle = 'white';
      ctx.fill();

      // Add subtle glow to inner circle
      ctx.shadowColor = 'rgba(255, 255, 255, 0.5)';
      ctx.shadowBlur = size * 0.05;

      return canvas;
    }

    function downloadCanvas(canvas, filename) {
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function downloadAll() {
      sizes.forEach(size => {
        const canvas = generateIcon(size);
        setTimeout(() => {
          downloadCanvas(canvas, `icon${size}.png`);
        }, size * 10); // Stagger downloads
      });
    }

    // Generate previews
    sizes.forEach(size => {
      const canvas = generateIcon(size);
      const div = document.createElement('div');
      div.className = 'icon-item';
      div.appendChild(canvas);

      const label = document.createElement('div');
      label.textContent = `${size}x${size}`;
      div.appendChild(label);

      const btn = document.createElement('button');
      btn.textContent = 'Download';
      btn.onclick = () => downloadCanvas(canvas, `icon${size}.png`);
      div.appendChild(btn);

      preview.appendChild(div);
    });
  </script>
</body>
</html>
